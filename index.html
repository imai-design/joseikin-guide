    .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    h1 { font-size: 24px; color: #111; border-bottom: 2px solid #333; padding-bottom: 10px; margin-top: 0; margin-bottom: 30px; }
    h2 { font-size: 18px; color: #222; background-color: #f1f3f5; padding: 10px 15px; border-left: 4px solid #0056b3; margin-top: 30px; margin-bottom: 15px; }
    p { margin-top: 0; margin-bottom: 15px; }
    ul { margin-top: 0; margin-bottom: 20px; padding-left: 20px; }
    li { margin-bottom: 8px; }
    strong { color: #d63384; background-color: #f8f9fa; padding: 2px 4px; border-radius: 4px; font-weight: bold; }

    .highlight-box h3 { margin-top: 0; color: #0056b3; font-size: 16px; }
    ol { margin-top: 0; margin-bottom: 20px; padding-left: 20px; }
    ol li { margin-bottom: 12px; }
    /* ゲート画面 */

    .gate p { color:#888; font-size:13px; margin: 0 0 20px; }
    .gate input { width:100%; box-sizing:border-box; padding:12px 14px; font-size:16px; border:1px solid #d0d5dd; border-radius:8px; margin-bottom:12px; }
    .gate button { width:100%; padding:12px; font-size:15px; font-weight:bold; color:#fff; background:#0056b3; border:none; border-radius:8px; cursor:pointer; }
    .gate button:hover { background:#004494; }
    .gate .err { color:#d63384; font-size:13px; min-height:18px; margin-top:10px; }
    @media (max-width: 600px) { body { padding: 10px; } .container { padding: 20px; } h1 { font-size: 20px; } h2 { font-size: 16px; } }

function b64ToBytes(b64){const bin=atob(b64);const a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a;}
async function unlock(){
  const pw = document.getElementById('pw').value.trim().toLowerCase();
  const err = document.getElementById('err');
  err.textContent='';
  if(!pw){err.textContent='合言葉を入力してください';return;}
  try{
    const enc = new TextEncoder();
    const salt = b64ToBytes(PAYLOAD.salt);
    const iv = b64ToBytes(PAYLOAD.iv);
    const ct = b64ToBytes(PAYLOAD.ct);
    const km = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey({name:'PBKDF2', salt, iterations:PAYLOAD.it, hash:'SHA-256'}, km, {name:'AES-GCM', length:256}, false, ['decrypt']);
    const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ct);
    const text = new TextDecoder().decode(pt);
    document.getElementById('gate').style.display='none';
    const c = document.getElementById('content');
    c.innerHTML = text;
    c.style.display='block';
    document.title = '助成金活用セミナー 解説';
  }catch(e){
    err.textContent='合言葉が違います';
  }
}
document.getElementById('go').addEventListener('click', unlock);
document.getElementById('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') unlock(); });
